name: .NET Core Desktop CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore AIStudyHub/AIStudyHub.slnx
      
    - name: Build
      run: dotnet build AIStudyHub/AIStudyHub.slnx --configuration Release --no-restore
      
    - name: Test
      run: dotnet test AIStudyHub/AIStudyHub.slnx --configuration Release --no-build --verbosity normal
